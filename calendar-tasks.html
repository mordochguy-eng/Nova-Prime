<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ועד - יומן פגישות ומטלות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        html { font-size: 14px; } body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: max-content repeat(6, minmax(0, 1fr)); gap: 1px; background-color: #e2e8f0; border: 1px solid #e2e8f0; border-radius: 0.75rem; overflow: hidden; height: 100%; }
        .calendar-cell { background-color: white; padding: 0.5rem; transition: background-color 0.2s; cursor: pointer; display: flex; flex-direction: column; min-height: 40px; overflow: hidden; }
        .calendar-cell:hover { background-color: #f1f5f9; }
        .calendar-cell.other-month { opacity: 0.5; background-color: #f8fafc; }
        .calendar-header { text-align: center; font-weight: 800; background-color: #f8fafc; padding: 0.75rem; color: #475569; font-size: 0.875rem; }
        .event-badge { font-size: 0.7rem; font-weight: 700; padding: 0.25rem; border-radius: 0.25rem; margin-top: 0.25rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; transition: transform 0.1s; }
        .event-badge:hover { transform: scale(1.02); }
        .today-cell { background-color: #f0fdf4; }
        .today-cell > span { background-color: #22c55e; color: white; border-radius: 9999px; width: 1.5rem; height: 1.5rem; display: inline-flex; align-items: center; justify-content: center; }
        
        /* Modal Overlay */
        #event-modal { backdrop-filter: blur(4px); }
    </style>
</head>
<body class="text-gray-800">

<div class="h-screen flex flex-col p-6 md:p-8">
    
    <header class="mb-8 flex flex-col justify-between items-start lg:flex-row lg:items-end gap-4 shrink-0">
        <div>
            <h1 class="text-3xl font-black text-gray-800 tracking-tight flex items-center gap-3">
                <span class="text-indigo-600">📅</span> ספר יומן ומשימות
            </h1>
            <p class="text-gray-500 font-medium mt-1">מבט חודשי על הפעילות, פגישות הנהלה, ותאריכי יעד (דדליינים).</p>
        </div>
        <div class="flex gap-3">
            <button id="today-btn" class="bg-white border-2 border-slate-200 text-slate-700 hover:bg-slate-50 font-bold px-4 py-2 rounded-xl transition shadow-sm">
                היום
            </button>
            <div class="flex bg-slate-100 rounded-xl p-1 shadow-inner">
                <button class="bg-white shadow-sm text-indigo-700 font-bold px-4 py-1.5 rounded-lg text-sm">חודשי</button>
                <button class="text-slate-500 hover:text-slate-700 font-bold px-4 py-1.5 rounded-lg text-sm transition opacity-50 cursor-not-allowed">שבועי</button>
            </div>
            <button id="create-event-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold shadow transition">
                <span>+</span> צור אירוע ביומן
            </button>
        </div>
    </header>

    <div class="flex gap-8 flex-1 overflow-hidden">
        
        <!-- Left/Main Calendar -->
        <div class="flex-1 bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col overflow-y-auto w-full">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h2 id="current-month-display" class="text-2xl font-black text-slate-800">...</h2>
                <div class="flex gap-2">
                    <button id="prev-month-btn" class="w-8 h-8 rounded-full border border-slate-200 flex justify-center items-center font-bold hover:bg-slate-100 transition">❮</button>
                    <button id="next-month-btn" class="w-8 h-8 rounded-full border border-slate-200 flex justify-center items-center font-bold hover:bg-slate-100 transition">❯</button>
                </div>
            </div>
            
            <div class="calendar-grid flex-1 h-full" id="calendar-grid-container">
                <!-- Days of week -->
                <div class="calendar-header">ראשון</div>
                <div class="calendar-header">שני</div>
                <div class="calendar-header">שלישי</div>
                <div class="calendar-header">רביעי</div>
                <div class="calendar-header">חמישי</div>
                <div class="calendar-header text-indigo-500">שישי</div>
                <div class="calendar-header text-red-500">שבת</div>
                
                <!-- Cells generated by JS will go here -->
            </div>
        </div>
        
        <!-- Right Sidebar panel for "Upcoming" list -->
        <div class="w-80 shrink-0 hidden xl:flex flex-col gap-6 h-full overflow-y-auto">
            <div class="bg-indigo-900 rounded-3xl p-6 text-white shadow-lg overflow-hidden relative shrink-0">
                <div class="absolute -right-4 -top-4 text-7xl opacity-10">📅</div>
                <h3 class="font-bold text-lg mb-1">סקירה מהירה</h3>
                <p id="upcoming-summary" class="text-indigo-200 text-sm mb-4">מחפש אירועים...</p>
                <div class="w-full bg-indigo-950/50 rounded-xl h-2 mb-2">
                    <div id="upcoming-progress" class="bg-indigo-400 h-2 rounded-xl w-[0%] transition-all duration-500"></div>
                </div>
            </div>
            
            <div class="bg-white rounded-3xl border border-slate-200 p-5 flex-1 shadow-sm flex flex-col overflow-hidden">
                <h3 class="font-black text-slate-800 text-lg mb-4 border-b pb-2 shrink-0">קרוב וחשוב</h3>
                
                <div id="upcoming-events-container" class="flex-1 overflow-y-auto flex flex-col gap-4 pr-1">
                    <!-- Upcoming Events Injected by JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Event Modal -->
<div id="event-modal" class="fixed inset-0 bg-slate-900/40 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden transform transition-all">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h3 id="modal-title" class="font-black text-xl text-slate-800">צור אירוע חדש</h3>
            <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 transition text-xl font-bold">&times;</button>
        </div>
        <div class="p-6">
            <form id="event-form" class="flex flex-col gap-4">
                <input type="hidden" id="event-id">
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">כותרת האירוע <span class="text-red-500">*</span></label>
                    <input type="text" id="event-title" required class="w-full border border-slate-300 rounded-xl p-2.5 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition" placeholder="למשל: ישיבת הנהלה">
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-slate-700 mb-1">תאריך <span class="text-red-500">*</span></label>
                        <input type="date" id="event-date" required class="w-full border border-slate-300 rounded-xl p-2.5 outline-none transition text-slate-700">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-slate-700 mb-1">שעה</label>
                        <input type="time" id="event-time" class="w-full border border-slate-300 rounded-xl p-2.5 outline-none transition text-slate-700">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">תיאור קצר</label>
                    <textarea id="event-desc" rows="2" class="w-full border border-slate-300 rounded-xl p-2.5 outline-none transition text-slate-700 resize-none" placeholder="הערות ופרטים נוספים..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">צבע</label>
                    <div class="flex gap-3" id="color-picker">
                        <label class="cursor-pointer">
                            <input type="radio" name="event-color" value="blue" checked class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-blue-500 peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-blue-500 transition"></div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="event-color" value="indigo" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-indigo-500 peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-indigo-500 transition"></div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="event-color" value="green" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-green-500 peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-green-500 transition"></div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="event-color" value="red" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-red-500 peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-red-500 transition"></div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="event-color" value="yellow" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-yellow-500 peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-yellow-500 transition"></div>
                        </label>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-100 flex justify-between items-center mt-2">
                    <button type="button" id="delete-event-btn" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-2 rounded-lg font-bold transition hidden">
                        מחק
                    </button>
                    <div class="flex gap-2 mr-auto">
                        <button type="button" id="export-google-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold transition hidden items-center gap-2">
                            <span>גוגל יומן</span> <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg" class="w-4 h-4" alt="Google">
                        </button>
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl font-bold shadow transition">
                            שמור
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // System Data
    const MONTH_NAMES = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];
    const DAY_NAMES = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
    const COLOR_CLASSES = {
        blue: { bg: 'bg-blue-100', text: 'text-blue-700', border: 'border-blue-200' },
        indigo: { bg: 'bg-indigo-100', text: 'text-indigo-700', border: 'border-indigo-200' },
        green: { bg: 'bg-green-100', text: 'text-green-700', border: 'border-green-200' },
        red: { bg: 'bg-red-100', text: 'text-red-700', border: 'border-red-200' },
        yellow: { bg: 'bg-yellow-100', text: 'text-yellow-700', border: 'border-yellow-200' }
    };

    // State
    let currentDate = new Date();
    let events = JSON.parse(localStorage.getItem('committee_events')) || [];

    // Elements
    const gridContainer = document.getElementById('calendar-grid-container');
    const monthDisplay = document.getElementById('current-month-display');
    const prevBtn = document.getElementById('prev-month-btn');
    const nextBtn = document.getElementById('next-month-btn');
    const todayBtn = document.getElementById('today-btn');
    
    const upcomingContainer = document.getElementById('upcoming-events-container');
    const upcomingSummary = document.getElementById('upcoming-summary');
    const upcomingProgress = document.getElementById('upcoming-progress');

    // Modal Elements
    const modal = document.getElementById('event-modal');
    const form = document.getElementById('event-form');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const createBtn = document.getElementById('create-event-btn');
    const deleteBtn = document.getElementById('delete-event-btn');
    const exportBtn = document.getElementById('export-google-btn');
    const modalTitle = document.getElementById('modal-title');

    // Initialization
    function init() {
        if(events.length === 0) {
            // Seed some dummy events if empty
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            const tomorrow = String(today.getDate() + 1).padStart(2, '0');
            const nextWeek = String(today.getDate() + 7).padStart(2, '0');

            events.push({ id: Date.now().toString(), title: 'פגישת הנהלה', date: `${y}-${m}-${d}`, time: '10:00', desc: 'נדבר על התקציב החודשי', color: 'indigo' });
            if(today.getDate() + 1 <= 28) events.push({ id: (Date.now()+1).toString(), title: 'הכנת שי לחג', date: `${y}-${m}-${tomorrow}`, time: '14:00', desc: 'מיון מתנות לעובדים', color: 'green' });
            if(today.getDate() + 7 <= 28) events.push({ id: (Date.now()+2).toString(), title: 'טיסת השתלמות', date: `${y}-${m}-${nextWeek}`, time: '', desc: 'לוינה', color: 'blue' });
            saveEvents();
        }

        renderCalendar();
        setupListeners();
    }

    function saveEvents() {
        localStorage.setItem('committee_events', JSON.stringify(events));
        renderCalendar(); // Re-render everything
    }

    // Calendar Rendering
    function renderCalendar() {
        // Clear cells (keep headers)
        Array.from(gridContainer.children).forEach(child => {
            if (!child.classList.contains('calendar-header')) {
                child.remove();
            }
        });

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        monthDisplay.textContent = `${MONTH_NAMES[month]} ${year}`;

        const firstDayOfMonth = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();

        const today = new Date();
        const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

        // Previous month padding
        for (let i = 0; i < firstDayOfMonth; i++) {
            const dayNum = daysInPrevMonth - firstDayOfMonth + i + 1;
            gridContainer.appendChild(createCell(dayNum, true));
        }

        // Current month
        for (let i = 1; i <= daysInMonth; i++) {
            const isToday = isCurrentMonth && today.getDate() === i;
            const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dayEvents = events.filter(e => e.date === dateString);
            
            gridContainer.appendChild(createCell(i, false, isToday, dateString, dayEvents));
        }

        // Next month padding
        const totalCells = firstDayOfMonth + daysInMonth;
        const paddingNeeded = (7 - (totalCells % 7)) % 7;
        const cellsToRenderNext = (totalCells + paddingNeeded) < 42 ? paddingNeeded + 7 : paddingNeeded; // Ensure 6 rows usually
        
        for (let i = 1; i <= cellsToRenderNext; i++) {
            gridContainer.appendChild(createCell(i, true));
        }

        renderUpcomingEvents();
    }

    function createCell(dayNum, isOtherMonth, isToday = false, fullDateString = null, dayEvents = []) {
        const div = document.createElement('div');
        div.className = `calendar-cell ${isOtherMonth ? 'other-month' : ''} ${isToday ? 'today-cell' : ''}`;
        
        let spanClasses = 'font-bold text-slate-700';
        if(isOtherMonth) spanClasses = 'font-bold text-slate-400';
        
        // Find if this is Friday/Sat
        let dayIndex = 0;
        if(fullDateString) {
            dayIndex = new Date(fullDateString).getDay();
        }
        if(!isOtherMonth && !isToday) {
            if(dayIndex === 5) spanClasses = 'font-bold text-indigo-500';
            if(dayIndex === 6) spanClasses = 'font-bold text-red-500';
        }

        div.innerHTML = `<span class="${spanClasses}">${dayNum}</span>`;

        if (fullDateString && !isOtherMonth) {
            div.dataset.date = fullDateString;
            div.addEventListener('click', (e) => {
                if(e.target.closest('.event-badge')) return; // Ignore if clicked on event
                openModal(null, fullDateString);
            });

            // Render Events inside Cell
            const eventsContainer = document.createElement('div');
            eventsContainer.className = 'mt-1 flex flex-col gap-1 flex-1 overflow-y-auto';
            
            // Sort by time
            dayEvents.sort((a,b) => (a.time || '24:00').localeCompare(b.time || '24:00'));

            dayEvents.forEach(evt => {
                const badge = document.createElement('div');
                const colors = COLOR_CLASSES[evt.color] || COLOR_CLASSES.indigo;
                badge.className = `event-badge ${colors.bg} ${colors.text} border ${colors.border}`;
                badge.textContent = `${evt.time ? evt.time + ' ' : ''}${evt.title}`;
                badge.dataset.id = evt.id;
                
                badge.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(evt);
                });
                
                eventsContainer.appendChild(badge);
            });
            div.appendChild(eventsContainer);
        }

        return div;
    }

    function renderUpcomingEvents() {
        upcomingContainer.innerHTML = '';
        
        const todayStr = new Date().toISOString().split('T')[0];
        
        // Filter events from today onwards
        const upcoming = events.filter(e => e.date >= todayStr).sort((a,b) => {
            if(a.date !== b.date) return a.date.localeCompare(b.date);
            return (a.time || '24:00').localeCompare(b.time || '24:00');
        });

        if(upcoming.length === 0) {
            upcomingContainer.innerHTML = '<div class="text-center text-slate-400 py-8 font-bold">אין אירועים קרובים</div>';
            upcomingSummary.textContent = 'היומן נקי בימים הקרובים';
            upcomingProgress.style.width = '100%';
            upcomingProgress.className = 'bg-green-400 h-2 rounded-xl transition-all duration-500 w-[100%]';
            return;
        }

        upcomingSummary.textContent = `נמצאו ${upcoming.length} אירועים קרובים (החל מהיום)`;
        upcomingProgress.style.width = '30%';
        upcomingProgress.className = 'bg-indigo-400 h-2 rounded-xl transition-all duration-500 w-[30%]';

        upcoming.slice(0, 5).forEach(evt => {
            const dateObj = new Date(evt.date);
            const monthName = MONTH_NAMES[dateObj.getMonth()].substring(0,3);
            const dayNum = dateObj.getDate();
            const colors = COLOR_CLASSES[evt.color] || COLOR_CLASSES.indigo;

            const html = `
                <div class="flex items-start gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-100 transition" onclick="openModalById('${evt.id}')">
                    <div class="${colors.bg} ${colors.text} rounded-lg p-2 text-center shrink-0 w-14 shadow-sm border ${colors.border}">
                        <span class="block font-black text-lg leading-none">${dayNum}</span>
                        <span class="block text-[10px] font-bold mt-1">${monthName}</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="font-bold text-slate-800 truncate">${evt.title}</p>
                        <p class="text-xs text-slate-500 mt-0.5 truncate">${evt.time ? '🕒 ' + evt.time : ''} ${evt.desc ? '- ' + evt.desc : ''}</p>
                    </div>
                </div>
            `;
            upcomingContainer.insertAdjacentHTML('beforeend', html);
        });
    }

    window.openModalById = function(id) {
        const evt = events.find(e => e.id === id);
        if(evt) openModal(evt);
    }

    // Listeners
    function setupListeners() {
        prevBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        nextBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
        todayBtn.addEventListener('click', () => {
            currentDate = new Date();
            renderCalendar();
        });

        createBtn.addEventListener('click', () => openModal());
        closeModalBtn.addEventListener('click', closeModal);
        
        // Modal Form Submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const idInput = document.getElementById('event-id').value;
            const newEvent = {
                id: idInput || Date.now().toString(),
                title: document.getElementById('event-title').value,
                date: document.getElementById('event-date').value,
                time: document.getElementById('event-time').value,
                desc: document.getElementById('event-desc').value,
                color: document.querySelector('input[name="event-color"]:checked').value
            };

            if(idInput) {
                // Edit
                const idx = events.findIndex(ev => ev.id === idInput);
                if(idx > -1) events[idx] = newEvent;
            } else {
                // Create
                events.push(newEvent);
            }

            saveEvents();
            closeModal();
        });

        deleteBtn.addEventListener('click', () => {
            const idInput = document.getElementById('event-id').value;
            if(idInput && confirm('האם למחוק את האירוע?')) {
                events = events.filter(ev => ev.id !== idInput);
                saveEvents();
                closeModal();
            }
        });

        exportBtn.addEventListener('click', () => {
            const title = encodeURIComponent(document.getElementById('event-title').value || 'אירוע ועד');
            const desc = encodeURIComponent(document.getElementById('event-desc').value || '');
            const dateVal = document.getElementById('event-date').value;
            const timeVal = document.getElementById('event-time').value;

            if(!dateVal) { alert('אנא הזן תאריך כדי לייצא לגוגל'); return; }

            // Format for Google Calendar: YYYYMMDDTHHMMSSZ (UTC). For simplicity without timezone math in prototype, 
            // we send YYYYMMDD and let google set it as an all-day event, OR use the time as well.
            const dateStr = dateVal.replace(/-/g, '');
            let datesParam = `${dateStr}/${dateStr}`; // All day

            if(timeVal) {
                // simple hack for local time to avoid timezone offsets in JS for now:
                // append local time string. Google accepts YYYYMMDDTHHMMSS format in local time if 'Z' is omitted.
                const timeStr = timeVal.replace(':', '') + '00';
                datesParam = `${dateStr}T${timeStr}/${dateStr}T${timeStr}`;
            }

            const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&details=${desc}&dates=${datesParam}`;
            window.open(url, '_blank');
        });
    }

    // Modal Logic
    function openModal(evt = null, presetDate = null) {
        form.reset();
        deleteBtn.classList.add('hidden');
        exportBtn.classList.add('hidden');
        
        // Default color
        document.querySelector('input[name="event-color"][value="indigo"]').checked = true;

        if (evt) {
            modalTitle.textContent = 'ערוך אירוע';
            document.getElementById('event-id').value = evt.id;
            document.getElementById('event-title').value = evt.title;
            document.getElementById('event-date').value = evt.date;
            document.getElementById('event-time').value = evt.time || '';
            document.getElementById('event-desc').value = evt.desc || '';
            
            if(evt.color) {
                const colorRadio = document.querySelector(`input[name="event-color"][value="${evt.color}"]`);
                if(colorRadio) colorRadio.checked = true;
            }

            deleteBtn.classList.remove('hidden');
            exportBtn.classList.remove('hidden');
            exportBtn.classList.add('flex');
        } else {
            modalTitle.textContent = 'צור אירוע חדש';
            document.getElementById('event-id').value = '';
            if (presetDate) {
                document.getElementById('event-date').value = presetDate;
            } else {
                // Set today as default
                const today = new Date();
                document.getElementById('event-date').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            }
        }

        modal.classList.remove('hidden');
        // focus title input
        setTimeout(() => document.getElementById('event-title').focus(), 100);
    }

    function closeModal() {
        modal.classList.add('hidden');
    }

    // Start
    init();

</script>
</body>
</html>
