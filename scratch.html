      function normalizeId(id) {

      function generateAvatarColor(str) {
          const colors = [
              'bg-blue-50 text-blue-600 border-blue-100',
              'bg-purple-50 text-purple-600 border-purple-100',
              'bg-orange-50 text-orange-600 border-orange-100',
              'bg-teal-50 text-teal-600 border-teal-100',
              'bg-amber-50 text-amber-600 border-amber-100'
          ];
          let hash = 0;
          for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
          return colors[Math.abs(hash) % colors.length];
      }

      function setupListeners() {
          // Search button triggers renderWorkers manually now.
  
          // ID validation on blur to remove error
          idInput.addEventListener('input', () => {

              const normId = normalizeId(rawId);
  
              // Duplicate Check

                  idInput.classList.add('border-red-500', 'focus:border-red-500');
                  idError.classList.remove('hidden');
                  return; // Stop submission

      // --- EXCEL IMPORT LOGIC ---
      let excelData = [];
      let excelHeaders = [];
      
      window.handleExcelUpload = function(e) {
          const file = e.target.files[0];
          if (!file) return;
  
          const reader = new FileReader();
          reader.onload = function(evt) {
              try {
                  if (typeof XLSX === 'undefined') {
                      throw new Error("Г—ВЎГ—ВӨГ—ВЁГ—в„ўГ—в„ўГ—ВӘ Г—вҖқГ—ВҗГ—В§Г—ВЎГ—Е“ Г—Е“Г—Вҗ Г—Г—ЛңГ—ВўГ—Г—вҖқ. Г—ВҗГ—Г—Вҗ Г—вҖҳГ—вҖңГ—вҖўГ—В§ Г—вҖ”Г—в„ўГ—вҖҳГ—вҖўГ—ВЁ Г—Е“Г—ВҗГ—в„ўГ—Г—ЛңГ—ВЁГ—Г—Лң 
Г—ВҗГ—вҖў Г—Г—ВЎГ—вҖқ Г—Е“Г—ВЁГ—ВўГ—Г—Её.");
                  }
                  const data = new Uint8Array(evt.target.result);
                  const workbook = XLSX.read(data, {type: 'array'});
                  const firstSheetName = workbook.SheetNames[0];
                  const worksheet = workbook.Sheets[firstSheetName];
                  
                  // Convert to JSON
                  excelData = XLSX.utils.sheet_to_json(worksheet, {defval: ""});
                  
                  if (excelData.length === 0) {
                      alert("Г—вҖқГ—В§Г—вҖўГ—вҖҳГ—ВҘ Г—ВЁГ—в„ўГ—В§ Г—ВҗГ—вҖў Г—Е“Г—Вҗ Г—ВӘГ—В§Г—в„ўГ—Её.");
                      return;
                  }
                  
                  // Get headers from first row
                  excelHeaders = Object.keys(excelData[0]);
                  
                  buildMappingUI();
                  document.getElementById('excel-mapping-modal').classList.remove('hidden');
                  document.getElementById('import-row-count').textContent = excelData.length + ' Г—В©Г—вҖўГ—ВЁГ—вҖўГ—ВӘ';
                  
                  // Reset input so same file can be selected again if needed
                  document.getElementById('excel-upload').value = '';
              } catch (err) {
                  console.error(err);
                  alert("Г—В©Г—вҖҷГ—в„ўГ—ВҗГ—вҖқ Г—вҖҳГ—ВӨГ—ВўГ—В Г—вҖўГ—вҖ” Г—вҖқГ—В§Г—вҖўГ—вҖҳГ—ВҘ: " + err.message);
              }
          };
          reader.readAsArrayBuffer(file);
      };
  
      window.closeMappingModal = function() {
          document.getElementById('excel-mapping-modal').classList.add('hidden');
          excelData = [];
          excelHeaders = [];
      };
  
      const systemFields = [

          { key: 'firstName', label: 'Г—В©Г—Вқ Г—ВӨГ—ВЁГ—ЛңГ—в„ў' },
          { key: 'lastName', label: 'Г—В©Г—Вқ Г—ЕҫГ—В©Г—ВӨГ—вҖ”Г—вҖқ' },
          { key: 'department', label: 'Г—ВӘГ—ВӨГ—В§Г—в„ўГ—вҖң / Г—ЕҫГ—вҖ”Г—Е“Г—В§Г—вҖқ' },
          { key: 'startDate', label: 'Г—ВӘГ—ВҗГ—ВЁГ—в„ўГ—ЕЎ Г—ВӘГ—вҖ”Г—в„ўГ—Е“Г—ВӘ Г—ВўГ—вҖҳГ—вҖўГ—вҖңГ—вҖқ' },
          { key: 'fte', label: 'Г—ВҗГ—вҖ”Г—вҖўГ—вҖ“ Г—ЕҫГ—В©Г—ВЁГ—вҖқ' },
          { key: 'phone', label: 'Г—ВЎГ—Е“Г—вҖўГ—Е“Г—ВЁГ—в„ў' },
          { key: 'email', label: 'Г—вҖңГ—вҖўГ—ВҗГ—ВЁ Г—ВҗГ—Е“Г—В§Г—ЛңГ—ВЁГ—вҖўГ—В Г—в„ў' },
          { key: 'city', label: 'Г—ВўГ—в„ўГ—ВЁ Г—ЕҫГ—вҖҷГ—вҖўГ—ВЁГ—в„ўГ—Вқ' }
      ];
  
      function buildMappingUI() {
          const container = document.getElementById('mapping-container');
          
          let html = '';
          systemFields.forEach(f => {
              // Try to auto guess
              let bestMatch = '';
              const testLabel = f.label.replace(' (Г—В©Г—вҖңГ—вҖқ Г—вҖ”Г—вҖўГ—вҖҳГ—вҖқ)', '');
              excelHeaders.forEach(h => {
                  if (h.includes(testLabel) || testLabel.includes(h) || 
                     (f.key === 'id' && (h.includes('Г—ВӘ.Г—вҖ“') || h.includes('Г—вҖ“Г—вҖқГ—вҖўГ—ВӘ'))) ||
                     (f.key === 'phone' && (h.includes('Г—В Г—в„ўГ—в„ўГ—вҖң') || h.includes('Г—ЛңГ—Е“Г—ВӨГ—вҖўГ—Её')))) {
                      bestMatch = h;
                  }
              });
  
              const options = excelHeaders.map(h => `<option value="${h}" ${h === bestMatch ? 'selected' : 
''}>${h}</option>`).join('');
              
              html += `
                  <div class="grid grid-cols-2 gap-4 items-center bg-white p-3 rounded-xl border border-gray-100 
shadow-sm">
                      <div class="font-bold text-gray-800 flex items-center gap-2">
                          ${f.label} ${f.req ? '<span class="text-red-500">*</span>' : ''}
                      </div>
                      <div>
                          <select id="map-${f.key}" class="w-full bg-gray-50 border-2 border-gray-200 rounded-lg py-2 
px-3 outline-none focus:border-indigo-500 font-bold text-indigo-700 transition">
                              <option value="">-- Г—ВҗГ—Е“ Г—ВӘГ—в„ўГ—в„ўГ—вҖҳГ—Вҗ Г—В©Г—вҖңГ—вҖқ Г—вҖ“Г—вҖқ --</option>
                              ${options}
                          </select>
                      </div>
                  </div>
              `;
          });
          
          container.innerHTML = html;
      }
  
      window.executeExcelImport = function() {
          const idCol = document.getElementById('map-id').value;
          if (!idCol) {
              alert("Г—вҖ”Г—вҖўГ—вҖҳГ—вҖқ Г—Е“Г—ЕҫГ—ВӨГ—вҖўГ—ВӘ Г—ВўГ—ЕҫГ—вҖўГ—вҖңГ—вҖқ Г—ВўГ—вҖҳГ—вҖўГ—ВЁ 'Г—ВӘГ—ВўГ—вҖўГ—вҖңГ—ВӘ Г—вҖ“Г—вҖқГ—вҖўГ—ВӘ'.");
              return;
          }
  
          let newCount = 0;
          let updateCount = 0;
          let errorCount = 0;
  
          excelData.forEach(row => {
              const rawId = row[idCol];
              if (!rawId) {
                  errorCount++;
                  return;
              }
  
              const normId = normalizeId(String(rawId));
              
              // Find existing worker
              let worker = workers.find(w => normalizeId(w.id) === normId);
              let isNew = false;
              
              if (!worker) {
                  isNew = true;
                  worker = { id: normId, tags: ["Г—в„ўГ—вҖўГ—вҖҳГ—Вҗ Г—ЕҫГ—ВҗГ—В§Г—ВЎГ—Е“"], years: 0 };
              }
  
              // Map fields safely
              systemFields.forEach(f => {
                  if (f.key === 'id') return; // already handled
                  
                  const colName = document.getElementById(`map-${f.key}`).value;
                  if (colName && row[colName] !== undefined && row[colName] !== null && String(row[colName]).trim() 
!== '') {
                      // We only write if the excel has a real value
                      if (f.key === 'city') {
                          if (!worker.address) worker.address = {};
                          worker.address.city = String(row[colName]).trim();
                      } else {
                          worker[f.key] = String(row[colName]).trim();
                      }
                  }
              });
  
              if (isNew) {
                  workers.push(worker);
                  newCount++;
              } else {
                  updateCount++;
              }
          });
  
          saveWorkers();
          renderWorkers();
          closeMappingModal();
          
          alert(`Г—вҖқГ—В§Г—Е“Г—в„ўГ—ЛңГ—вҖқ Г—вҖқГ—ВЎГ—ВӘГ—в„ўГ—в„ўГ—ЕҫГ—вҖқ Г—вҖҳГ—вҖқГ—ВҰГ—Е“Г—вҖ”Г—вҖқ!\nГ—Г—вҖўГ—ВЎГ—ВӨГ—вҖў: ${newCount} Г—ВўГ—вҖўГ—вҖҳГ—вҖңГ—в„ўГ—Вқ Г—вҖ”Г—вҖңГ—В©Г—в„ўГ—Вқ.\nГ—ВўГ—вҖўГ—вҖңГ—вҖәГ—
Г—вҖў: ${updateCount} Г—ВўГ—вҖўГ—вҖҳГ—вҖңГ—в„ўГ—Вқ Г—В§Г—в„ўГ—в„ўГ—ЕҫГ—в„ўГ—Вқ.\nГ—В©Г—вҖўГ—ВЁГ—вҖўГ—ВӘ Г—В©Г—вҖқГ—ВӘГ—ВўГ—Е“Г—ЕҫГ—Г—вҖў (Г—Е“Г—Е“Г—Вҗ Г—ВӘ.Г—вҖ“): ${errorCount}`);
      };
  
      // Run
      init();
